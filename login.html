<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 | 정책·금융 공시 모니터링 시스템</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d8e0eb;
      --text: #111827;
      --subtle: #5b687c;
      --brand: #1f3b61;
      --danger: #b42318;
      --radius: 14px;
      --shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(860px 280px at 0% -20%, #e4ecf8 0%, transparent 58%),
        radial-gradient(720px 300px at 100% -20%, #e7edf7 0%, transparent 55%),
        var(--bg);
    }

    .login {
      width: min(100%, 380px);
      background: var(--panel);
      border: 1px solid rgba(150, 166, 189, 0.24);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 22px 20px 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: -0.012em;
      font-weight: 700;
      color: #1f2f46;
    }

    p {
      margin: 8px 0 18px;
      color: var(--subtle);
      font-size: 13px;
      line-height: 1.55;
    }

    .field { margin-bottom: 10px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #4f5f76;
      font-weight: 600;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid #d5ddea;
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      font-size: 14px;
      color: var(--text);
      background: #fcfdff;
      outline: none;
    }

    input:focus {
      border-color: #8ea8cb;
      box-shadow: 0 0 0 3px rgba(31, 59, 97, 0.12);
    }

    button {
      width: 100%;
      min-height: 42px;
      margin-top: 6px;
      border: 1px solid #1f3b61;
      border-radius: 10px;
      background: linear-gradient(150deg, #1f3b61 0%, #273f62 100%);
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled { opacity: 0.6; cursor: wait; }

    .error {
      margin-top: 10px;
      min-height: 18px;
      color: var(--danger);
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="login">
    <h1>정책·금융 공시 모니터링 시스템</h1>
    <p>계정으로 로그인 후 대시보드를 이용할 수 있습니다.</p>

    <form id="loginForm">
      <div class="field">
        <label for="id">아이디</label>
        <input id="id" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">비밀번호</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>
      <button id="loginBtn" type="submit">로그인</button>
      <div class="error" id="error"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const idInput = document.getElementById("id");
    const pwInput = document.getElementById("password");
    const btn = document.getElementById("loginBtn");
    const errorEl = document.getElementById("error");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";
      btn.disabled = true;
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id: idInput.value.trim(),
            password: pwInput.value.trim()
          })
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || "로그인에 실패했습니다.");
        }
        location.href = "/dashboard";
      } catch (err) {
        errorEl.textContent = err.message || "로그인 오류가 발생했습니다.";
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
