<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>상세 - 통합 대시보드</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

    :root {
      --primary: #0163c7;
      --primary-light: #0057c0;
      --primary-dark: #003763;
      --primary-bg: #ebf5ff;
      --black-010: #121212;
      --gray-030: #333333;
      --gray-050: #8d8d8d;
      --gray-060: #50504f;
      --gray-070: #707070;
      --gray-090: #aaaaaa;
      --gray-100: #e5e7eb;
      --gray-110: #f4f4f4;
      --surface: #f9fafb;
      --border: #e5e7eb;
      --radius-s: 8px;
      --radius-m: 12px;
      --error: #e4022d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--black-010);
      background: #ffffff;
      line-height: 1.5;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shared Top Nav ──────────────────────────── */
    .top-nav { background: #ffffff; border-bottom: 1px solid var(--border); }
    .nav-inner {
      max-width: 1320px; margin: 0 auto; padding: 0 60px;
      display: flex; justify-content: space-between; align-items: center; height: 64px;
    }
    .top-nav-left { display: flex; align-items: center; gap: 24px; }
    .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-img { height: 36px; width: auto; }
    .logo-fallback {
      display: none; width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary-bg); color: var(--primary); font-weight: 800;
      align-items: center; justify-content: center;
    }
    .system-name { font-size: 20px; font-weight: 700; color: var(--gray-030); }
    .top-nav-right { display: flex; align-items: center; gap: 16px; }
    .user-info { font-size: 15px; color: var(--gray-060); }
    .noti-btn {
      background: none; border: none; cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center; color: var(--gray-060);
    }
    .noti-badge {
      position: absolute; top: -2px; right: -2px; background: #ef4444; color: #fff;
      font-size: 10px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--primary-bg);
      color: var(--primary); font-weight: 600; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .logout-btn {
      border: 1px solid var(--border); background: #ffffff; padding: 6px 12px;
      border-radius: 16px; font-size: 14px; font-weight: 600; color: var(--gray-060);
      cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: inherit;
    }

    /* ── Article Layout ──────────────────────────── */
    .article-wrap {
      max-width: 1320px; margin: 36px auto; padding: 0 60px;
    }

    .article-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--primary); font-size: 14px; font-weight: 600;
      text-decoration: none; margin-bottom: 20px;
    }
    .article-back:hover { text-decoration: underline; }

    .article-title-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--primary);
      border-radius: var(--radius-m);
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .article-type-badge {
      display: inline-flex;
      align-items: center;
      background: var(--primary-bg);
      border: 1px solid #cce0ff;
      color: var(--primary);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .article-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.45;
      letter-spacing: -0.02em;
      color: var(--black-010);
      margin: 0;
    }
    .article-title-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 12px;
      font-size: 13px;
      color: var(--gray-060);
    }

    .article-body-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 24px;
      align-items: start;
    }

    .article-card {
      background: #ffffff; border: 1px solid var(--border);
      border-radius: var(--radius-m); padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .section-title {
      font-size: 16px; font-weight: 700; color: #111;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 2px solid var(--primary);
    }

    /* Meta table */
    .meta-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    }
    .meta-item {
      display: flex; gap: 10px; align-items: baseline;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 14px; color: var(--gray-060); min-height: 40px;
    }
    .meta-item strong {
      min-width: 70px; color: var(--gray-030); font-weight: 700; flex-shrink: 0;
    }
    .meta-item a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .meta-item a:hover { text-decoration: underline; }

    /* Content body */
    .content-body {
      border: 1px solid var(--border); border-radius: var(--radius-s);
      background: var(--surface); min-height: 200px; padding: 20px;
      font-size: 16px; line-height: 1.75; color: #1f2937; overflow: auto;
    }
    .content-body, .content-body * {
      font-family: "Pretendard", "Malgun Gothic", sans-serif !important;
    }
    .content-body.plain { white-space: pre-wrap; }
    .content-body h1, .content-body h2, .content-body h3 {
      font-size: 16px !important; font-weight: 700 !important; margin: 12px 0 8px !important;
    }
    .content-body p { margin: 0 0 10px; }
    .content-body img { max-width: 100%; height: auto; }
    .content-body table { width: 100%; border-collapse: collapse; margin: 8px 0 12px; }
    .content-body td, .content-body th {
      border: 1px solid var(--border); padding: 8px; vertical-align: top;
      font-size: 14px; line-height: 1.6;
    }

    /* Attachments */
    .att-list { list-style: none; }
    .att-list li {
      border-bottom: 1px solid var(--border); padding: 10px 0;
      font-size: 14px; word-break: break-all;
    }
    .att-list li:last-child { border-bottom: 0; }
    .att-list a {
      color: var(--primary); text-decoration: none; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .att-list a:hover { text-decoration: underline; }

    .report-card { margin-top: 24px; }
    .report-meta {
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--gray-060);
    }
    .report-body {
      border: 1px solid var(--border);
      border-radius: var(--radius-s);
      background: var(--surface);
      padding: 14px;
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 14px;
      color: #1f2937;
      max-height: 460px;
      overflow: auto;
    }
    .report-empty {
      color: var(--gray-060);
      font-size: 14px;
    }
    .report-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      border-bottom: 2px solid var(--primary);
    }
    .report-head .section-title {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 12px;
    }
    .analysis-btn {
      border: 1px solid #bfd7ff;
      background: linear-gradient(180deg, #ffffff 0%, #f5f9ff 100%);
      color: var(--primary-dark);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      white-space: nowrap;
    }
    .analysis-btn:hover { border-color: var(--primary); color: var(--primary); }
    .analysis-btn:disabled {
      opacity: 0.65;
      cursor: wait;
      color: var(--gray-060);
    }
    .analysis-report {
      background: #ffffff;
      padding: 20px;
      max-height: none;
      white-space: normal;
    }
    .analysis-report h1,
    .analysis-report h2,
    .analysis-report h3 {
      color: #111827;
      line-height: 1.4;
      margin: 18px 0 10px;
      font-weight: 800;
    }
    .analysis-report h1 { font-size: 20px; margin-top: 0; }
    .analysis-report h2 { font-size: 17px; }
    .analysis-report h3 { font-size: 15px; }
    .analysis-report p,
    .analysis-report li {
      font-size: 14px;
      line-height: 1.75;
      color: #1f2937;
    }
    .analysis-report ul {
      margin: 8px 0 14px 18px;
    }
    .analysis-report table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 18px;
      font-size: 13px;
    }
    .analysis-report th {
      background: #f3f7ff;
      color: #1f2937;
      font-weight: 800;
    }
    .analysis-report th,
    .analysis-report td {
      border: 1px solid #d9e4f5;
      padding: 9px 10px;
      vertical-align: top;
      line-height: 1.6;
    }

    .related-news-block { margin-top: 24px; }
    .related-news-list { list-style: none; }
    .related-news-item {
      border: 1px solid var(--border);
      border-radius: var(--radius-s);
      background: #fafbff;
      padding: 14px;
      margin-top: 12px;
    }
    .related-news-item:first-child { margin-top: 0; }
    .related-news-link {
      color: var(--black-010);
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
      display: block;
    }
    .related-news-link:hover { color: var(--primary); }
    .related-news-meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--gray-060);
    }
    .related-news-summary {
      margin-top: 8px;
      color: #374151;
      font-size: 13px;
      line-height: 1.6;
    }
    .related-news-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .related-news-tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #e0ecff;
      color: #1d4ed8;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 700;
    }

    /* Similar */
    .similar-list { list-style: none; }
    .similar-list li { border-bottom: 1px solid var(--border); padding: 12px 0; }
    .similar-list li:last-child { border-bottom: 0; }
    .similar-list a {
      color: var(--black-010); text-decoration: none; font-weight: 600;
      font-size: 14px; line-height: 1.5; display: block;
    }
    .similar-list a:hover { color: var(--primary); }
    .similar-meta { margin-top: 4px; font-size: 12px; color: var(--gray-060); }

    .empty { color: var(--gray-060); font-size: 14px; padding: 8px 0; }
    .error-msg { color: var(--error); font-size: 14px; font-weight: 700; }

    @media (max-width: 1024px) {
      .article-wrap { padding: 0 20px; margin: 24px auto; }
      .nav-inner { padding: 0 20px; }
      .article-body-grid { grid-template-columns: 1fr; }
      .article-title { font-size: 20px; }
      .meta-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    class TextUtil {
      static escapeHtml(value) {
        if (value == null) return "";
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }
      static decodeEntities(value) {
        if (value == null) return "";
        const ta = document.createElement("textarea");
        ta.innerHTML = String(value);
        return ta.value;
      }
      static safe(value) { return TextUtil.escapeHtml(TextUtil.decodeEntities(value)); }
    }

    class DateUtil {
      static onlyDate(value) {
        if (!value) return "";
        const s = String(value).trim().slice(0, 10).replace(/[./]/g, "-");
        const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
        if (!m) return s;
        return `${m[1]}-${m[2].padStart(2, "0")}-${m[3].padStart(2, "0")}`;
      }
    }

    class ChannelUtil {
      static label(ch) {
        if (ch === "arirang_news_api") return "뉴스기사";
        if (ch === "fss_press_explainer" || ch === "fsc_press_explainer") return "보도설명자료";
        if (ch === "fsc_admin_guidance_notice" || ch === "fss_admin_guidance_notice") return "행정지도예고";
        if (ch === "fsc_admin_guidance_enforcement" || ch === "fss_admin_guidance_enforcement") return "행정지도시행";
        if (ch === "fsc_law_interpretation") return "법령해석";
        if (ch === "fsc_no_action_opinion") return "비조치의견서";
        if (["fsc_rule_change_notice","ksd_rule_change_notice","krx_rule_change_notice","kofia_rule_change_notice"].includes(ch)) return "규정 제개정 예고";
        if (["fsc_regulation_notice","krx_recent_rule_change","kofia_recent_rule_change"].includes(ch)) return "최신 제·개정 정보";
        if (ch === "kfb_publicdata_other" || ch === "fsec_bbs_222") return "기타자료";
        return "보도자료";
      }
    }

    class HtmlUtil {
      static sanitize(html) {
        const t = document.createElement("template");
        t.innerHTML = html;
        t.content.querySelectorAll("script,style,iframe,object,embed,link,meta").forEach(el => el.remove());
        t.content.querySelectorAll("*").forEach(el => {
          [...el.attributes].forEach(attr => {
            const n = attr.name.toLowerCase();
            if (n.startsWith("on") || n === "style") el.removeAttribute(attr.name);
          });
        });
        return t.innerHTML;
      }
    }

    class MarkdownUtil {
      static inline(value) {
        return TextUtil.safe(value)
          .replace(/&lt;br\s*\/?&gt;/gi, "<br>")
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      }
      static table(lines) {
        const rows = lines
          .filter(line => line.trim().startsWith("|") && line.trim().endsWith("|"))
          .map(line => line.trim().slice(1, -1).split("|").map(cell => MarkdownUtil.inline(cell.trim())));
        if (!rows.length) return "";
        const head = rows[0].map(cell => `<th>${cell}</th>`).join("");
        const bodyRows = rows.slice(2).map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join("")}</tr>`).join("");
        return `<table><thead><tr>${head}</tr></thead><tbody>${bodyRows}</tbody></table>`;
      }
      static render(markdown) {
        const lines = String(markdown || "").replace(/\r\n?/g, "\n").split("\n");
        const out = [];
        let list = [];
        const flushList = () => {
          if (!list.length) return;
          out.push(`<ul>${list.map(item => `<li>${MarkdownUtil.inline(item)}</li>`).join("")}</ul>`);
          list = [];
        };
        for (let i = 0; i < lines.length; i += 1) {
          const raw = lines[i];
          const line = raw.trim();
          if (!line) { flushList(); continue; }
          if (line.startsWith("|") && i + 1 < lines.length && /^\|?\s*:?-{3,}/.test(lines[i + 1].trim())) {
            flushList();
            const tableLines = [line, lines[i + 1]];
            i += 2;
            while (i < lines.length && lines[i].trim().startsWith("|")) {
              tableLines.push(lines[i]);
              i += 1;
            }
            i -= 1;
            out.push(MarkdownUtil.table(tableLines));
            continue;
          }
          const h = line.match(/^(#{1,3})\s+(.+)$/);
          if (h) {
            flushList();
            out.push(`<h${h[1].length}>${MarkdownUtil.inline(h[2])}</h${h[1].length}>`);
            continue;
          }
          const li = line.match(/^[-*]\s+(.+)$/);
          if (li) {
            list.push(li[1]);
            continue;
          }
          flushList();
          out.push(`<p>${MarkdownUtil.inline(line)}</p>`);
        }
        flushList();
        return out.join("");
      }
    }

    class UrlUtil {
      static preferredOrigin(data) {
        const org = (data.organization || "").trim();
        if (data.source_system === "data_go_api") {
          if (org === "금융위원회") return "https://www.fsc.go.kr";
          if (org === "개인정보보호위원회") return "https://www.pipc.go.kr";
          if (org === "재정경제부") return "https://www.moef.go.kr";
        }
        for (const u of [data.detail_url, data.original_url]) {
          if (!u) continue;
          try { return new URL(u).origin; } catch (_) {}
        }
        return window.location.origin;
      }
      static toAbsolute(raw, baseOrigin) {
        if (!raw) return "";
        const v = TextUtil.decodeEntities(String(raw)).trim();
        if (!v || v.startsWith("#") || v.toLowerCase().startsWith("javascript:")) return v;
        try { return new URL(v, `${baseOrigin}/`).toString(); } catch (_) { return v; }
      }
      static normalizeEmbeddedUrls(container, data) {
        const defaultOrigin = UrlUtil.preferredOrigin(data);
        const org = (data.organization || "").trim();
        container.querySelectorAll("[src],[href]").forEach(el => {
          if (el.hasAttribute("src")) {
            const rawSrc = el.getAttribute("src");
            const baseOrigin = rawSrc && rawSrc.startsWith("/comm/") && org === "금융위원회" ? "https://www.fsc.go.kr" : defaultOrigin;
            const fixed = UrlUtil.toAbsolute(rawSrc, baseOrigin);
            if (fixed) el.setAttribute("src", fixed); else el.removeAttribute("src");
          }
          if (el.hasAttribute("href")) {
            const fixed = UrlUtil.toAbsolute(el.getAttribute("href"), defaultOrigin);
            if (fixed) {
              el.setAttribute("href", fixed);
              if (/^https?:/i.test(fixed)) { el.setAttribute("target","_blank"); el.setAttribute("rel","noopener noreferrer"); }
            } else el.removeAttribute("href");
          }
        });
      }
    }

    class ArticlePage {
      constructor() {
        this.articleData = null;
        this.el = {
          typeBadge: document.getElementById("typeBadge"),
          title: document.getElementById("title"),
          titleMeta: document.getElementById("titleMeta"),
          meta: document.getElementById("meta"),
          content: document.getElementById("content"),
          attList: document.getElementById("attList"),
          similarList: document.getElementById("similarList"),
          relatedNewsWrap: document.getElementById("relatedNewsWrap"),
          llmReportWrap: document.getElementById("llmReportWrap"),
        };
      }

      getArticleId() { return new URLSearchParams(window.location.search).get("id"); }

      async init() {
        const id = this.getArticleId();
        if (!id) { this.showError("잘못된 접근입니다: id 파라미터가 없습니다."); return; }
        try {
          const res = await fetch(`/api/article?id=${encodeURIComponent(id)}`);
          if (!res.ok) { this.showError(`상세 조회 실패 (${res.status})`); return; }
          const data = await res.json();
          this.render(data);
          await this.renderRelatedNews(id);
          await this.renderLinkedReport(id);
          await this.renderSimilar(id);
        } catch (err) {
          this.showError(`상세 조회 중 오류가 발생했습니다. (${TextUtil.safe(err.message)})`);
        }
      }

      showError(message) {
        this.el.title.textContent = message;
        this.el.content.classList.add("plain");
        this.el.content.innerHTML = `<div class="error-msg">${TextUtil.safe(message)}</div>`;
      }

      render(data) {
        this.articleData = data;
        const title = TextUtil.decodeEntities(data.title || "(제목 없음)");
        document.title = `${title} | 통합 대시보드`;

        // Title card
        this.el.typeBadge.textContent = ChannelUtil.label(data.source_channel || "");
        this.el.title.textContent = title;
        this.el.titleMeta.innerHTML = [
          data.organization && `<span>${TextUtil.safe(data.organization)}</span>`,
          data.department && `<span>${TextUtil.safe(data.department)}</span>`,
          data.published_at && `<span>발행일 ${TextUtil.safe(DateUtil.onlyDate(data.published_at))}</span>`,
        ].filter(Boolean).join("");

        // Meta table
        const ext = data.original_url || data.detail_url || "";
        const rows = [
          ["자료 구분", ChannelUtil.label(data.source_channel || "")],
          ["기관", data.organization || "-"],
          ["부서", data.department || "-"],
          ["발행일자", DateUtil.onlyDate(data.published_at) || "-"],
          data.amendment_type && ["처리구분", data.amendment_type],
          data.public_yn && ["공개여부", data.public_yn],
          data.registrant && ["등록자", data.registrant],
          data.reply_date && ["회신일", DateUtil.onlyDate(data.reply_date)],
          data.case_number && ["일련번호", data.case_number],
          (data.notice_start || data.notice_end) && ["예고기간", [DateUtil.onlyDate(data.notice_start), DateUtil.onlyDate(data.notice_end)].filter(Boolean).join(" ~ ")],
          data.effective_date && ["시행일", DateUtil.onlyDate(data.effective_date)],
          data.enforcement_status && ["시행여부", data.enforcement_status],
        ].filter(Boolean);

        this.el.meta.innerHTML = rows.map(([label, val]) =>
          `<div class="meta-item"><strong>${TextUtil.safe(label)}</strong><span>${TextUtil.safe(String(val))}</span></div>`
        ).join("") + (ext ? `<div class="meta-item"><strong>원문 링크</strong><a href="${TextUtil.escapeHtml(ext)}" target="_blank" rel="noopener noreferrer">원문 보기 →</a></div>` : "");

        this.renderContent(data);
        this.renderAttachments(data.attachments || []);
      }

      renderContent(data) {
        const htmlBody = TextUtil.decodeEntities(data.content_html || "");
        if (htmlBody.trim()) {
          this.el.content.classList.remove("plain");
          this.el.content.innerHTML = HtmlUtil.sanitize(htmlBody);
          UrlUtil.normalizeEmbeddedUrls(this.el.content, data);
          // 3개 이상 연속 <br> -> 2개로 압축
          let inner = this.el.content.innerHTML;
          
          // 1. 의미 없는 빈 P 태그를 <br><br>로 변환 (추후 공통 압축을 위함)
          inner = inner.replace(/<p[^>]*>(?:[\s\u00A0]|&nbsp;|<br\s*\/?>)*<\/p>/gi, "<br><br>");
          
          // 2. <br> 태그가 공백이나 &nbsp;를 사이에 두고 3개 이상 연속될 경우 2개로 압축
          inner = inner.replace(/(?:<br\s*\/?>(?:[\s\u00A0]|&nbsp;)*){3,}/gi, "<br><br>");
          
          this.el.content.innerHTML = inner;
          return;
        }
        this.el.content.classList.add("plain");
        const rawText = TextUtil.decodeEntities(data.content_text || "(본문 없음)");
        
        // 3줄 이상 연속된 줄바꿈(중간에 공백/캐리지 리턴 \r 포함)을 2줄로 압축
        this.el.content.textContent = rawText.replace(/\n(?:\s*\n){2,}/g, "\n\n");
      }

      renderAttachments(items) {
        if (!items.length) {
          this.el.attList.innerHTML = `<li class="empty">첨부파일이 없습니다.</li>`;
          return;
        }
        this.el.attList.innerHTML = items.map(att => {
          const name = TextUtil.safe(att.file_name || "(이름 없음)");
          const url = TextUtil.escapeHtml(att.file_url || "");
          return `<li><a href="${url}" target="_blank" rel="noopener noreferrer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            ${name}</a></li>`;
        }).join("");
      }

      isAdminGuidance() {
        const ch = (this.articleData && this.articleData.source_channel) || "";
        return [
          "fsc_admin_guidance_notice",
          "fss_admin_guidance_notice",
          "fsc_admin_guidance_enforcement",
          "fss_admin_guidance_enforcement",
        ].includes(ch);
      }

      reportHeader() {
        const title = this.isAdminGuidance() ? "내규 영향도 보고서" : "연결 보고서";
        const button = this.isAdminGuidance()
          ? `<button class="analysis-btn" id="internalRuleAnalyzeBtn" type="button">
              <span>내규 영향도 분석</span>
            </button>`
          : "";
        return `<div class="report-head"><h2 class="section-title">${title}</h2>${button}</div>`;
      }

      bindAnalysisButton(articleId) {
        const btn = document.getElementById("internalRuleAnalyzeBtn");
        if (!btn) return;
        btn.addEventListener("click", () => this.runInternalRuleAnalysis(articleId));
      }

      renderReportItem(item, articleId) {
        const title = TextUtil.safe(item.title || "생성 보고서");
        const done = TextUtil.safe(DateUtil.onlyDate(item.llm_completed_at || item.created_at || ""));
        const provider = TextUtil.safe(item.llm_provider || "-");
        const model = TextUtil.safe(item.llm_model || "-");
        const srcCount = Number(item.source_count || 0).toLocaleString();
        const body = MarkdownUtil.render(item.report_markdown || "");
        this.el.llmReportWrap.innerHTML = `
          ${this.reportHeader()}
          <div class="report-meta">${title} · ${done} · ${provider}/${model} · 근거 ${srcCount}건</div>
          <div class="report-body analysis-report">${body}</div>
        `;
        this.bindAnalysisButton(articleId);
      }

      async runInternalRuleAnalysis(articleId) {
        const btn = document.getElementById("internalRuleAnalyzeBtn");
        if (btn) {
          btn.disabled = true;
          btn.innerHTML = "<span>분석 중...</span>";
        }
        this.el.llmReportWrap.innerHTML = `
          ${this.reportHeader()}
          <div class="report-empty">행정지도 첨부와 내규 목록을 분석하고 있습니다. 보통 1분 내외가 걸립니다.</div>
        `;
        this.bindAnalysisButton(articleId);
        const loadingBtn = document.getElementById("internalRuleAnalyzeBtn");
        if (loadingBtn) {
          loadingBtn.disabled = true;
          loadingBtn.innerHTML = "<span>분석 중...</span>";
        }
        try {
          const res = await fetch("/api/article/analyze-internal-rules", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ article_id: Number(articleId) }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) throw new Error(data.error || `HTTP ${res.status}`);
          this.renderReportItem(data.item, articleId);
        } catch (err) {
          this.el.llmReportWrap.innerHTML = `
            ${this.reportHeader()}
            <div class="report-empty">분석에 실패했습니다. ${TextUtil.safe(err.message || "")}</div>
          `;
          this.bindAnalysisButton(articleId);
        }
      }

      async renderRelatedNews(articleId) {
        try {
          const res = await fetch(`/api/related-news?id=${encodeURIComponent(articleId)}&limit=5`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const items = data.items || [];
          if (!items.length) {
            this.el.relatedNewsWrap.innerHTML = `
              <h2 class="section-title">관련 뉴스</h2>
              <div class="report-empty">현재 연결된 관련 뉴스가 없습니다.</div>
            `;
            return;
          }
          this.el.relatedNewsWrap.innerHTML = `
            <h2 class="section-title">관련 뉴스</h2>
            <div class="report-meta">첨부 자료와 본문을 기준으로 관련성 높은 기사만 최대 5건 표시합니다.</div>
            <ul class="related-news-list">
              ${items.map((item) => {
                const title = TextUtil.safe(item.title || "");
                const org = TextUtil.safe(item.organization || "");
                const date = TextUtil.safe(DateUtil.onlyDate(item.published_at));
                const summary = TextUtil.safe(item.summary || "");
                const tags = (item.reasons || []).map((reason) =>
                  `<span class="related-news-tag">${TextUtil.safe(reason)}</span>`
                ).join("");
                return `
                  <li class="related-news-item">
                    <a class="related-news-link" href="/article?id=${item.id}">${title}</a>
                    <div class="related-news-meta">${org} · ${date}</div>
                    <div class="related-news-summary">${summary || "요약 정보가 없습니다."}</div>
                    <div class="related-news-tags">${tags}</div>
                  </li>
                `;
              }).join("")}
            </ul>
          `;
        } catch (_) {
          this.el.relatedNewsWrap.innerHTML = `
            <h2 class="section-title">관련 뉴스</h2>
            <div class="report-empty">관련 뉴스를 불러오지 못했습니다.</div>
          `;
        }
      }

      async renderLinkedReport(articleId) {
        try {
          const res = await fetch(`/api/article-report?id=${encodeURIComponent(articleId)}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const item = data.item;
          if (!item || !item.report_markdown) {
            this.el.llmReportWrap.innerHTML = `
              ${this.reportHeader()}
              <div class="report-empty">${this.isAdminGuidance() ? "아직 생성된 내규 영향도 보고서가 없습니다. 분석 버튼을 눌러 보고서를 생성하세요." : "이 자료에 연결된 생성 보고서가 아직 없습니다."}</div>
            `;
            this.bindAnalysisButton(articleId);
            return;
          }

          this.renderReportItem(item, articleId);
        } catch (_) {
          this.el.llmReportWrap.innerHTML = `
            ${this.reportHeader()}
            <div class="report-empty">보고서를 불러오지 못했습니다.</div>
          `;
          this.bindAnalysisButton(articleId);
        }
      }

      async renderSimilar(articleId) {
        try {
          const res = await fetch(`/api/similar?id=${encodeURIComponent(articleId)}&limit=8`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const items = data.items || [];
          if (!items.length) {
            this.el.similarList.innerHTML = `<li class="empty">유사한 공시가 없습니다.</li>`;
            return;
          }
          this.el.similarList.innerHTML = items.map(it => {
            const title = TextUtil.safe(it.title || "");
            const org = TextUtil.safe(it.organization || "");
            const date = TextUtil.safe(DateUtil.onlyDate(it.published_at));
            return `<li>
              <a href="/article?id=${it.id}">${title}</a>
              <div class="similar-meta">${org} · ${date}</div>
            </li>`;
          }).join("");
        } catch (_) {
          this.el.similarList.innerHTML = `<li class="empty">유사 공시를 불러오지 못했습니다.</li>`;
        }
      }
    }

    new ArticlePage().init();
  </script>

  <footer style="border-top: 1px solid var(--border); padding: 40px 30px; margin-top: 60px; background: var(--surface); text-align: center; color: var(--gray-060); font-size: 13px; line-height: 1.6;">
